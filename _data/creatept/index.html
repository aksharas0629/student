<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clothing Recommender</title>
  <style>
        /* Universal selector to enforce Arial font for all elements */
        * {
          font-family: Arial, sans-serif !important;
        }
    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      margin: 60px auto;
      padding: 0 20px;
      color: #222;
      background: #fff;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: normal;
      margin-bottom: 4px;
    }

    p.sub {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 5px;
      color: #444;
    }

    input, select {
      display: block;
      width: 100%;
      padding: 7px 8px;
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
      border: 1px solid #ccc;
      background: #fff;
      color: #222;
      margin-bottom: 18px;
      box-sizing: border-box;
      border-radius: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #555;
    }

    .error {
      font-size: 0.78rem;
      color: #c00;
      margin-top: -14px;
      margin-bottom: 14px;
      display: none;
    }

    button {
      padding: 8px 22px;
      font-size: 0.9rem;
      font-family: Arial, sans-serif;
      background: #222;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    button:hover { background: #444; }

    #resultBox {
      display: none;
      margin-top: 28px;
      border-top: 1px solid #ddd;
      padding-top: 20px;
    }

    #resultBox h2 {
      font-size: 0.85rem;
      font-weight: normal;
      color: #888;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: Arial, sans-serif;
    }

    .items {
      font-size: 1rem;
      line-height: 1.9;
      font-family: Arial, sans-serif;
    }

    .items span {
      display: inline-block;
      margin-right: 12px;
      color: #222;
      font-family: Arial, sans-serif;
    }

    .items span::before {
      content: "– ";
      color: #aaa;
    }

    .none {
      font-size: 0.9rem;
      color: #888;
      font-style: italic;
      font-family: Arial, sans-serif;
    }


  body {
    font-family: Georgia, serif;
    max-width: 420px;
    margin: 60px auto;
    padding: 0 20px;
    color: #222;

    /* Background image */
    background-image: url("yellowbackground.png.webp");
    background-size: cover;         
    background-position: center;   
    background-repeat: no-repeat;   
    background-attachment: fixed;    

    /* Keep text readable on top of image */
    min-height: 100vh;
  }

  </style>
</head>
<body>

  <h1>Clothing Recommender</h1>
  <p class="sub">Enter today's weather to get suggestions.</p>

  <label for="tempInput">Temperature (°F)</label>
  <input type="number" id="tempInput"/>
  <p class="error" id="tempError">Please enter a temperature.</p>

  <label for="conditionInput">Condition</label>
  <select id="conditionInput">
    <option value="">Choose one...</option>
    <option value="sunny">Sunny</option>
    <option value="cloudy">Cloudy</option>
    <option value="cold">Cold</option>
    <option value="windy">Windy</option>
    <option value="rainy">Rainy</option>
    <option value="stormy">Stormy</option>
    <option value="snowy">Snowy</option>
  </select>
  <p class="error" id="condError">Please choose a condition.</p>

  <button id="recommendBtn">Recommend</button>

  <div id="resultBox">
    <h2>Suggested items</h2>
    <div id="resultLabel"></div>
  </div>

<script>
  // LIST: stores all clothing items with temperature ranges and conditions.
  // A list is used so adding new items requires no changes to the logic.
  var clothingList = [
    { item: "T-shirt",    minTemp: 70,  maxTemp: 120, conditions: ["sunny","cloudy"] },
    { item: "Shorts",     minTemp: 75,  maxTemp: 120, conditions: ["sunny"] },
    { item: "Jacket",     minTemp: 50,  maxTemp: 70,  conditions: ["cold","windy","cloudy"] },
    { item: "Sweater",    minTemp: 45,  maxTemp: 65,  conditions: ["cold","cloudy"] },
    { item: "Raincoat",   minTemp: 40,  maxTemp: 80,  conditions: ["rainy","stormy"] },
    { item: "Umbrella",   minTemp: 30,  maxTemp: 100, conditions: ["rainy","stormy"] },
    { item: "Coat",       minTemp: 0,   maxTemp: 50,  conditions: ["snowy","cold"] },
    { item: "Boots",      minTemp: 0,   maxTemp: 60,  conditions: ["snowy","rainy"] },
    { item: "Gloves",     minTemp: 0,   maxTemp: 45,  conditions: ["snowy","cold","windy"] },
    { item: "Sunglasses", minTemp: 65,  maxTemp: 120, conditions: ["sunny"] }
  ];

  // PROCEDURE: recommendClothing
  // Parameters: temp (Number), condition (String), list (Array)
  // Returns: Array of matching item name strings
  // Contains sequencing, selection, and iteration.
  function recommendClothing(temp, condition, list) {
    var matches = [];                        // SEQUENCING: initialize result

    for (var i = 0; i < list.length; i++) { // ITERATION: loop every item
      var currentItem = list[i];

      // SELECTION: check temperature range
      var tempMatch = (temp >= currentItem.minTemp && temp <= currentItem.maxTemp);

      // ITERATION + SELECTION: check each condition in the item's list
      var conditionMatch = false;
      for (var j = 0; j < currentItem.conditions.length; j++) {
        if (condition === currentItem.conditions[j]) {
          conditionMatch = true;
        }
      }

      // SELECTION: add only if both checks pass
      if (tempMatch && conditionMatch) {
        matches.push(currentItem.item);      // SEQUENCING: build result
      }
    }
    return matches;
  }

  // OUTPUT: renders results on the page
  function displayResult(temp, condition) {
    var results = recommendClothing(temp, condition, clothingList);
    var box   = document.getElementById("resultBox");
    var label = document.getElementById("resultLabel");
    box.style.display = "block";
    label.innerHTML = "";

    if (results.length === 0) {
      label.innerHTML = '<p class="none">No exact match. Try layering clothes.</p>';
    } else {
      var div = document.createElement("div");
      div.className = "items";
      for (var k = 0; k < results.length; k++) {
        var s = document.createElement("span");
        s.textContent = results[k];
        div.appendChild(s);
      }
      label.appendChild(div);
    }
  }

  // INPUT: button click event
  document.getElementById("recommendBtn").addEventListener("click", function() {
    var tempRaw   = document.getElementById("tempInput").value;
    var condition = document.getElementById("conditionInput").value;
    var tempErr   = document.getElementById("tempError");
    var condErr   = document.getElementById("condError");
    var valid = true;

    if (tempRaw === "" || isNaN(Number(tempRaw))) {
      tempErr.style.display = "block"; valid = false;
    } else { tempErr.style.display = "none"; }

    if (condition === "") {
      condErr.style.display = "block"; valid = false;
    } else { condErr.style.display = "none"; }

    if (!valid) return;
    displayResult(Number(tempRaw), condition);
  });
</script>
</body>
</html>
